<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Portal Analytics — Truffle Nation</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --primary: #6D2E46; --primary-dark: #4e1f31;
      --secondary: #A26769; --accent: #ECE2D0;
      --bg: #FAF7F2; --white: #ffffff;
      --text: #1a1a1a; --text-muted: #666;
      --border: #e8e0d5; --radius: 12px;
      --success: #2d8a4e; --warn: #d97706;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* HEADER */
    .app-header { background: var(--primary); color: white; padding: 16px 28px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
    .app-header h1 { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; }
    .app-header .sub { font-size: 12px; opacity: 0.75; margin-top: 2px; }
    .header-right { display: flex; gap: 10px; align-items: center; }
    .back-link { color: rgba(255,255,255,0.8); text-decoration: none; font-size: 13px; }
    .back-link:hover { color: white; }

    /* FILTERS BAR */
    .filters-bar { background: var(--white); border-bottom: 1px solid var(--border); padding: 12px 28px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .filter-label { font-size: 12px; font-weight: 600; color: var(--text-muted); white-space: nowrap; }
    .filter-input { padding: 7px 12px; border: 1px solid var(--border); border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 13px; color: var(--text); background: var(--white); outline: none; }
    .filter-input[type="date"] { width: 140px; }
    .filter-input:focus { border-color: var(--primary); }
    .apply-btn { background: var(--primary); color: white; border: none; border-radius: 8px; padding: 7px 16px; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; }
    .apply-btn:hover { background: var(--primary-dark); }
    .reset-btn { background: transparent; color: var(--text-muted); border: 1px solid var(--border); border-radius: 8px; padding: 7px 12px; font-family: 'Inter', sans-serif; font-size: 13px; cursor: pointer; }
    .reset-btn:hover { border-color: var(--secondary); color: var(--text); }

    /* TABS */
    .tabs { background: var(--white); border-bottom: 1px solid var(--border); padding: 0 28px; display: flex; overflow-x: auto; }
    .tab-btn { padding: 14px 20px; background: none; border: none; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 500; color: var(--text-muted); cursor: pointer; border-bottom: 3px solid transparent; transition: all 0.2s; white-space: nowrap; }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 600; }

    /* CONTENT */
    .content { padding: 28px; max-width: 1200px; margin: 0 auto; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* STAT CARDS */
    .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 28px; }
    .stat-card {
      background: var(--white); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px 16px;
      border-top: 3px solid var(--primary);
    }
    .stat-card .label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 8px; }
    .stat-card .value { font-size: 32px; font-weight: 700; font-family: 'Playfair Display', serif; color: var(--primary); line-height: 1; }
    .stat-card .sub-value { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

    /* CHARTS */
    .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px; }
    .chart-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
    .chart-card.full { grid-column: 1 / -1; }
    .chart-title { font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 700; margin-bottom: 16px; color: var(--text); }
    .chart-wrap { position: relative; height: 260px; }

    /* TABLES */
    .table-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); }
    .data-table { width: 100%; border-collapse: collapse; background: var(--white); min-width: 800px; }
    .data-table th { text-align: left; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); padding: 10px 14px; background: var(--bg); white-space: nowrap; }
    .data-table td { padding: 11px 14px; border-top: 1px solid var(--border); font-size: 13px; vertical-align: middle; }
    .data-table tr:hover td { background: #fdf9f5; }

    /* PROGRESS BAR */
    .progress-bar-wrap { background: var(--accent); border-radius: 4px; height: 8px; overflow: hidden; width: 100%; min-width: 80px; }
    .progress-bar-fill { background: var(--primary); height: 100%; border-radius: 4px; transition: width 0.6s ease; }
    .progress-cell { display: flex; align-items: center; gap: 8px; }
    .progress-pct { font-size: 12px; font-weight: 600; color: var(--primary); white-space: nowrap; }

    /* BADGES */
    .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 700; }
    .badge.beginner { background: #dcfce7; color: #15803d; }
    .badge.intermediate { background: #fef3c7; color: #92400e; }
    .badge.advanced { background: #fce4ec; color: var(--primary); }
    .badge.active { background: #dcfce7; color: #15803d; }
    .badge.inactive { background: #fee2e2; color: #b91c1c; }

    /* DROP-OFF BADGES */
    .drop-badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 700; }
    .drop-badge.good { background: #dcfce7; color: #15803d; }
    .drop-badge.warn { background: #fef3c7; color: #92400e; }
    .drop-badge.bad { background: #fee2e2; color: #b91c1c; }

    /* FUNNEL VIZ */
    .funnel-viz { margin-bottom: 28px; }
    .funnel-stage {
      display: flex; align-items: center; gap: 14px; padding: 14px 18px;
      background: var(--white); border: 1px solid var(--border);
      border-radius: var(--radius); margin-bottom: 8px;
      position: relative;
    }
    .funnel-stage-bar {
      height: 36px; background: var(--primary); border-radius: 6px;
      min-width: 4px; transition: width 0.6s ease;
    }
    .funnel-stage-info { flex: 1; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .funnel-stage-name { font-size: 14px; font-weight: 600; white-space: nowrap; }
    .funnel-stage-count { font-size: 20px; font-weight: 700; font-family: 'Playfair Display', serif; color: var(--primary); }
    .funnel-stage-meta { display: flex; align-items: center; gap: 10px; }
    .funnel-arrow { text-align: center; color: var(--text-muted); font-size: 16px; margin: -4px 0; }

    /* SEARCH + TOOLBAR */
    .toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
    .search-input { flex: 1; min-width: 200px; padding: 9px 14px; border: 1px solid var(--border); border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 14px; outline: none; }
    .search-input:focus { border-color: var(--primary); }
    .export-btn-secondary { background: var(--primary); color: white; border: none; border-radius: 8px; padding: 9px 16px; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; text-decoration: none; display: flex; align-items: center; gap: 6px; }
    .export-btn-secondary:hover { background: var(--primary-dark); }

    /* PAGINATION */
    .pagination { display: flex; align-items: center; justify-content: space-between; margin-top: 14px; font-size: 13px; color: var(--text-muted); }
    .page-btns { display: flex; gap: 6px; }
    .page-btn { padding: 6px 12px; border: 1px solid var(--border); border-radius: 6px; background: var(--white); font-family: 'Inter', sans-serif; font-size: 13px; cursor: pointer; }
    .page-btn:hover { border-color: var(--primary); color: var(--primary); }
    .page-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
    .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* LOADING + EMPTY */
    .loading { text-align: center; padding: 48px; color: var(--text-muted); }
    .loading-spinner { display: inline-block; width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.7s linear infinite; margin-bottom: 10px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-state { text-align: center; padding: 48px 24px; color: var(--text-muted); }

    /* RESPONSIVE */
    @media (max-width: 900px) {
      .stat-grid { grid-template-columns: repeat(2, 1fr); }
      .chart-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 600px) {
      .stat-grid { grid-template-columns: 1fr 1fr; }
      .content { padding: 16px; }
      .app-header { padding: 14px 16px; }
      .filters-bar { padding: 10px 16px; }
      .tabs { padding: 0 16px; }
      .stat-card .value { font-size: 24px; }
    }
  </style>
</head>
<body>

<div class="app-header">
  <div>
    <h1>Student Portal Analytics</h1>
    <div class="sub">Truffle Nation — Student Learning Portal</div>
  </div>
  <div class="header-right">
    <a href="/" class="back-link">&larr; Back to Hub</a>
  </div>
</div>

<div class="filters-bar">
  <span class="filter-label">Date range:</span>
  <input type="date" class="filter-input" id="filter-from">
  <span class="filter-label">to</span>
  <input type="date" class="filter-input" id="filter-to">
  <button class="reset-btn" onclick="setDay(0)">Today</button>
  <button class="reset-btn" onclick="setDay(1)">Yesterday</button>
  <button class="apply-btn" onclick="applyDateFilter()">Apply</button>
  <button class="reset-btn" onclick="resetDateFilter()">Reset</button>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('overview')">Overview</button>
  <button class="tab-btn" onclick="switchTab('courses')">Courses</button>
  <button class="tab-btn" onclick="switchTab('funnel')">Funnel</button>
  <button class="tab-btn" onclick="switchTab('students')">Students</button>
</div>

<div class="content">

  <!-- OVERVIEW TAB -->
  <div class="tab-panel active" id="panel-overview">
    <div class="stat-grid" id="overview-stats">
      <div class="loading"><div class="loading-spinner"></div><br>Loading overview...</div>
    </div>
    <div class="chart-grid">
      <div class="chart-card">
        <div class="chart-title">Daily Active Users (Last 30 Days)</div>
        <div class="chart-wrap"><canvas id="dau-chart"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Daily Enrollments (Last 30 Days)</div>
        <div class="chart-wrap"><canvas id="enrollments-chart"></canvas></div>
      </div>
    </div>
  </div>

  <!-- COURSES TAB -->
  <div class="tab-panel" id="panel-courses">
    <div class="table-wrap" id="courses-table-wrap">
      <div class="loading"><div class="loading-spinner"></div><br>Loading courses...</div>
    </div>
  </div>

  <!-- FUNNEL TAB -->
  <div class="tab-panel" id="panel-funnel">
    <div id="funnel-viz-container">
      <div class="loading"><div class="loading-spinner"></div><br>Loading funnel...</div>
    </div>
    <div class="chart-card" id="funnel-chart-card" style="display:none; margin-top: 28px;">
      <div class="chart-title">Engagement Funnel — Bar Chart</div>
      <div class="chart-wrap"><canvas id="funnel-bar-chart"></canvas></div>
    </div>
  </div>

  <!-- STUDENTS TAB -->
  <div class="tab-panel" id="panel-students">
    <div class="toolbar">
      <input class="search-input" id="student-search" placeholder="Search by name, email, or username..." oninput="debounceStudentSearch()">
      <a class="export-btn-secondary" href="/api/portal/export" target="_blank">Export CSV</a>
    </div>
    <div id="students-table-wrap">
      <div class="loading"><div class="loading-spinner"></div><br>Loading students...</div>
    </div>
    <div class="pagination" id="students-pagination" style="display:none">
      <div id="students-page-info"></div>
      <div class="page-btns" id="students-page-btns"></div>
    </div>
  </div>

</div>

<script>
  // ── STATE ──
  let dauChart = null;
  let enrollChart = null;
  let funnelBarChart = null;
  let studentPage = 1;
  let studentSearch = '';
  let studentDebounceTimer = null;
  let currentTab = 'overview';
  let tabDataLoaded = { overview: false, courses: false, funnel: false, students: false };

  // ── TAB SWITCHING ──
  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach((btn, i) => {
      const tabs = ['overview', 'courses', 'funnel', 'students'];
      btn.classList.toggle('active', tabs[i] === tab);
    });
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-' + tab).classList.add('active');

    if (!tabDataLoaded[tab]) {
      if (tab === 'overview') loadOverview();
      if (tab === 'courses') loadCourses();
      if (tab === 'funnel') loadFunnel();
      if (tab === 'students') loadStudents();
    }
  }

  // ── DATE FILTER ──
  function getDateParams() {
    const from = document.getElementById('filter-from').value;
    const to = document.getElementById('filter-to').value;
    let params = '';
    if (from) params += '&from=' + from;
    if (to) params += '&to=' + to;
    return params;
  }

  function setDay(offset) {
    const d = new Date();
    d.setDate(d.getDate() - offset);
    const ds = d.toISOString().split('T')[0];
    document.getElementById('filter-from').value = ds;
    document.getElementById('filter-to').value = ds;
    applyDateFilter();
  }

  function applyDateFilter() {
    tabDataLoaded.overview = false;
    loadOverview();
  }

  function resetDateFilter() {
    document.getElementById('filter-from').value = '';
    document.getElementById('filter-to').value = '';
    tabDataLoaded.overview = false;
    loadOverview();
  }

  // ── FETCH HELPER ──
  async function fetchJSON(url) {
    const res = await fetch(url);
    if (!res.ok) throw new Error('API error: ' + res.status);
    return res.json();
  }

  function showLoading(el) {
    el.innerHTML = '<div class="loading"><div class="loading-spinner"></div><br>Loading...</div>';
  }

  function showError(el, msg) {
    el.innerHTML = '<div class="empty-state">' + (msg || 'Failed to load data. Please try again.') + '</div>';
  }

  // ── FORMAT HELPERS ──
  function fmt(n) {
    if (n == null) return '—';
    if (typeof n === 'number') return n.toLocaleString();
    return n;
  }

  function pct(n) {
    if (n == null) return '—';
    return parseFloat(n).toFixed(1) + '%';
  }

  function shortDate(d) {
    if (!d) return '—';
    const dt = new Date(d);
    return dt.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
  }

  function diffBadge(dropPct) {
    const v = parseFloat(dropPct);
    if (isNaN(v)) return '<span class="drop-badge good">—</span>';
    let cls = 'good';
    if (v >= 40) cls = 'bad';
    else if (v >= 20) cls = 'warn';
    return '<span class="drop-badge ' + cls + '">' + v.toFixed(1) + '% drop</span>';
  }

  function difficultyBadge(d) {
    const level = (d || '').toLowerCase();
    if (level === 'beginner') return '<span class="badge beginner">Beginner</span>';
    if (level === 'intermediate') return '<span class="badge intermediate">Intermediate</span>';
    if (level === 'advanced') return '<span class="badge advanced">Advanced</span>';
    return '<span class="badge">' + (d || '—') + '</span>';
  }

  function statusBadge(s) {
    const status = (s || '').toLowerCase();
    if (status === 'active') return '<span class="badge active">Active</span>';
    return '<span class="badge inactive">Inactive</span>';
  }

  function progressBar(val) {
    const v = parseFloat(val) || 0;
    return '<div class="progress-cell">' +
      '<div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:' + v + '%"></div></div>' +
      '<span class="progress-pct">' + v.toFixed(1) + '%</span></div>';
  }

  // ── OVERVIEW ──
  async function loadOverview() {
    const statsEl = document.getElementById('overview-stats');
    showLoading(statsEl);

    try {
      const dateParams = getDateParams();
      const data = await fetchJSON('/api/portal/overview?_=1' + dateParams);

      const stats = data.stats || data;
      const cards = [
        { label: 'Total Students', value: fmt(stats.totalStudents || stats.total_students || 0) },
        { label: 'Active (7d)', value: fmt(stats.activeStudents || stats.active_7d || 0) },
        { label: 'Enrollments', value: fmt(stats.totalEnrollments || stats.enrollments || 0) },
        { label: 'Lesson Completions', value: fmt(stats.lessonCompletions || stats.lesson_completions || 0) },
        { label: 'Quiz Attempts', value: fmt(stats.quizAttempts || stats.quiz_attempts || 0) },
        { label: 'Avg Progress', value: pct(stats.avgProgress || stats.avg_progress || 0) },
        { label: 'Community Posts', value: fmt(stats.communityPosts || stats.community_posts || 0) },
        { label: 'Certificates', value: fmt(stats.certificates || stats.certificates_issued || 0) },
      ];

      statsEl.innerHTML = cards.map(c =>
        '<div class="stat-card"><div class="label">' + c.label + '</div><div class="value">' + c.value + '</div></div>'
      ).join('');

      // DAU chart
      const dailyActive = data.dailyActiveUsers || data.daily_active_users || [];
      renderDAUChart(dailyActive);

      // Enrollments chart
      const dailyEnrollments = data.dailyEnrollments || data.daily_enrollments || [];
      renderEnrollmentsChart(dailyEnrollments);

      tabDataLoaded.overview = true;
    } catch (err) {
      console.error('Overview load error:', err);
      showError(statsEl);
    }
  }

  function renderDAUChart(data) {
    const ctx = document.getElementById('dau-chart');
    if (dauChart) dauChart.destroy();

    const labels = data.map(d => d.date || d.day);
    const values = data.map(d => d.count || d.value || d.active_users || 0);

    dauChart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: labels,
        datasets: [{
          label: 'Active Users',
          data: values,
          backgroundColor: '#6D2E46',
          borderRadius: 4,
          borderSkipped: false,
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: {
            ticks: { font: { size: 10 }, maxRotation: 45, maxTicksLimit: 15 },
            grid: { display: false }
          },
          y: {
            beginAtZero: true,
            ticks: { font: { size: 11 } },
            grid: { color: '#f0ebe3' }
          }
        }
      }
    });
  }

  function renderEnrollmentsChart(data) {
    const ctx = document.getElementById('enrollments-chart');
    if (enrollChart) enrollChart.destroy();

    const labels = data.map(d => d.date || d.day);
    const values = data.map(d => d.count || d.value || d.enrollments || 0);

    enrollChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{
          label: 'Enrollments',
          data: values,
          borderColor: '#6D2E46',
          backgroundColor: 'rgba(109,46,70,0.1)',
          fill: true,
          tension: 0.3,
          pointRadius: 2,
          pointHoverRadius: 5,
          borderWidth: 2,
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: {
            ticks: { font: { size: 10 }, maxRotation: 45, maxTicksLimit: 15 },
            grid: { display: false }
          },
          y: {
            beginAtZero: true,
            ticks: { font: { size: 11 } },
            grid: { color: '#f0ebe3' }
          }
        }
      }
    });
  }

  // ── COURSES ──
  async function loadCourses() {
    const wrap = document.getElementById('courses-table-wrap');
    showLoading(wrap);

    try {
      const data = await fetchJSON('/api/portal/courses');
      const courses = (data.courses || data || []).sort((a, b) => {
        const ae = a.enrollments || a.total_enrollments || 0;
        const be = b.enrollments || b.total_enrollments || 0;
        return be - ae;
      });

      if (courses.length === 0) {
        showError(wrap, 'No courses found.');
        tabDataLoaded.courses = true;
        return;
      }

      let html = '<table class="data-table">';
      html += '<thead><tr>';
      html += '<th>Course Name</th><th>Category</th><th>Difficulty</th><th>Enrollments</th><th>Avg Progress</th><th>Completions</th><th>Lessons</th>';
      html += '</tr></thead><tbody>';

      courses.forEach(c => {
        const enrollments = c.enrollments || c.total_enrollments || 0;
        const avgProgress = c.avgProgress || c.avg_progress || 0;
        const completions = c.completions || c.total_completions || 0;
        const lessons = c.lessons || c.total_lessons || c.lesson_count || 0;
        const name = c.name || c.title || c.course_name || '—';
        const category = c.category || '—';
        const difficulty = c.difficulty || c.level || '—';

        html += '<tr>';
        html += '<td style="font-weight:600">' + name + '</td>';
        html += '<td>' + category + '</td>';
        html += '<td>' + difficultyBadge(difficulty) + '</td>';
        html += '<td>' + fmt(enrollments) + '</td>';
        html += '<td>' + progressBar(avgProgress) + '</td>';
        html += '<td>' + fmt(completions) + '</td>';
        html += '<td>' + fmt(lessons) + '</td>';
        html += '</tr>';
      });

      html += '</tbody></table>';
      wrap.innerHTML = html;
      tabDataLoaded.courses = true;
    } catch (err) {
      console.error('Courses load error:', err);
      showError(wrap);
    }
  }

  // ── FUNNEL ──
  async function loadFunnel() {
    const container = document.getElementById('funnel-viz-container');
    showLoading(container);

    try {
      const data = await fetchJSON('/api/portal/funnel');
      const stages = data.stages || data.funnel || data || [];

      if (stages.length === 0) {
        showError(container, 'No funnel data available.');
        tabDataLoaded.funnel = true;
        return;
      }

      const maxCount = Math.max(...stages.map(s => s.count || s.users || 0));

      let html = '<div class="funnel-viz">';

      stages.forEach((stage, i) => {
        const count = stage.count || stage.users || 0;
        const name = stage.name || stage.stage || stage.label || '—';
        const barWidth = maxCount > 0 ? Math.max((count / maxCount) * 100, 2) : 2;

        let dropHtml = '';
        if (i > 0) {
          const prevCount = stages[i - 1].count || stages[i - 1].users || 0;
          if (prevCount > 0) {
            const dropPct = ((prevCount - count) / prevCount) * 100;
            dropHtml = diffBadge(dropPct);
          }
        } else {
          dropHtml = '<span class="drop-badge good">Entry</span>';
        }

        html += '<div class="funnel-stage">';
        html += '<div class="funnel-stage-bar" style="width:' + barWidth + '%"></div>';
        html += '<div class="funnel-stage-info">';
        html += '<span class="funnel-stage-name">' + name + '</span>';
        html += '<div class="funnel-stage-meta">';
        html += dropHtml;
        html += '<span class="funnel-stage-count">' + fmt(count) + '</span>';
        html += '</div></div></div>';

        if (i < stages.length - 1) {
          html += '<div class="funnel-arrow">&darr;</div>';
        }
      });

      html += '</div>';
      container.innerHTML = html;

      // Render bar chart version
      renderFunnelBarChart(stages);
      document.getElementById('funnel-chart-card').style.display = 'block';

      tabDataLoaded.funnel = true;
    } catch (err) {
      console.error('Funnel load error:', err);
      showError(container);
    }
  }

  function renderFunnelBarChart(stages) {
    const ctx = document.getElementById('funnel-bar-chart');
    if (funnelBarChart) funnelBarChart.destroy();

    const labels = stages.map(s => s.name || s.stage || s.label || '—');
    const values = stages.map(s => s.count || s.users || 0);

    const colors = stages.map((_, i) => {
      const opacity = 1 - (i * 0.08);
      return 'rgba(109,46,70,' + Math.max(opacity, 0.3) + ')';
    });

    funnelBarChart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: labels,
        datasets: [{
          label: 'Users',
          data: values,
          backgroundColor: colors,
          borderRadius: 4,
          borderSkipped: false,
        }]
      },
      options: {
        indexAxis: 'y',
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: {
            beginAtZero: true,
            grid: { color: '#f0ebe3' },
            ticks: { font: { size: 11 } }
          },
          y: {
            ticks: { font: { size: 11 } },
            grid: { display: false }
          }
        }
      }
    });
  }

  // ── STUDENTS ──
  function debounceStudentSearch() {
    clearTimeout(studentDebounceTimer);
    studentDebounceTimer = setTimeout(() => {
      studentSearch = document.getElementById('student-search').value.trim();
      studentPage = 1;
      loadStudents();
    }, 400);
  }

  async function loadStudents() {
    const wrap = document.getElementById('students-table-wrap');
    showLoading(wrap);
    document.getElementById('students-pagination').style.display = 'none';

    try {
      const params = '?search=' + encodeURIComponent(studentSearch) + '&page=' + studentPage;
      const data = await fetchJSON('/api/portal/students' + params);

      const students = data.students || data.data || data.results || [];
      const total = data.total || data.totalCount || data.total_count || students.length;
      const perPage = data.perPage || data.per_page || data.limit || 25;
      const totalPages = Math.ceil(total / perPage) || 1;

      if (students.length === 0) {
        showError(wrap, 'No students found.');
        tabDataLoaded.students = true;
        return;
      }

      let html = '<div class="table-wrap"><table class="data-table" style="min-width:1100px">';
      html += '<thead><tr>';
      html += '<th>Name</th><th>Email</th><th>City</th><th>Experience</th><th>Registered</th>';
      html += '<th>Courses</th><th>Avg Progress</th><th>Lessons Done</th><th>Last Login</th><th>Status</th>';
      html += '</tr></thead><tbody>';

      students.forEach(s => {
        const name = s.name || s.full_name || ((s.first_name || '') + ' ' + (s.last_name || '')).trim() || '—';
        const email = s.email || '—';
        const city = s.city || s.location || '—';
        const experience = s.experience || s.experience_level || '—';
        const registered = shortDate(s.registered || s.registered_at || s.created_at);
        const coursesEnrolled = s.coursesEnrolled || s.courses_enrolled || s.enrollments || 0;
        const avgProgress = s.avgProgress || s.avg_progress || 0;
        const lessonsDone = s.lessonsDone || s.lessons_completed || s.lessons_done || 0;
        const lastLogin = shortDate(s.lastLogin || s.last_login || s.last_active);
        const status = s.status || (s.is_active ? 'active' : 'inactive') || 'inactive';

        html += '<tr>';
        html += '<td style="font-weight:600">' + name + '</td>';
        html += '<td>' + email + '</td>';
        html += '<td>' + city + '</td>';
        html += '<td>' + experience + '</td>';
        html += '<td>' + registered + '</td>';
        html += '<td>' + fmt(coursesEnrolled) + '</td>';
        html += '<td>' + progressBar(avgProgress) + '</td>';
        html += '<td>' + fmt(lessonsDone) + '</td>';
        html += '<td>' + lastLogin + '</td>';
        html += '<td>' + statusBadge(status) + '</td>';
        html += '</tr>';
      });

      html += '</tbody></table></div>';
      wrap.innerHTML = html;

      // Pagination
      renderStudentPagination(total, perPage, totalPages);
      tabDataLoaded.students = true;
    } catch (err) {
      console.error('Students load error:', err);
      showError(wrap);
    }
  }

  function renderStudentPagination(total, perPage, totalPages) {
    const paginationEl = document.getElementById('students-pagination');
    const infoEl = document.getElementById('students-page-info');
    const btnsEl = document.getElementById('students-page-btns');

    if (totalPages <= 1) {
      infoEl.textContent = 'Showing ' + total + ' student' + (total !== 1 ? 's' : '');
      btnsEl.innerHTML = '';
      paginationEl.style.display = 'flex';
      return;
    }

    const start = (studentPage - 1) * perPage + 1;
    const end = Math.min(studentPage * perPage, total);
    infoEl.textContent = 'Showing ' + start + '–' + end + ' of ' + fmt(total) + ' students';

    let btnsHtml = '';
    btnsHtml += '<button class="page-btn" onclick="goStudentPage(' + (studentPage - 1) + ')"' + (studentPage <= 1 ? ' disabled' : '') + '>&laquo; Prev</button>';

    const maxVisible = 5;
    let startPage = Math.max(1, studentPage - Math.floor(maxVisible / 2));
    let endPage = Math.min(totalPages, startPage + maxVisible - 1);
    if (endPage - startPage < maxVisible - 1) startPage = Math.max(1, endPage - maxVisible + 1);

    for (let p = startPage; p <= endPage; p++) {
      btnsHtml += '<button class="page-btn' + (p === studentPage ? ' active' : '') + '" onclick="goStudentPage(' + p + ')">' + p + '</button>';
    }

    btnsHtml += '<button class="page-btn" onclick="goStudentPage(' + (studentPage + 1) + ')"' + (studentPage >= totalPages ? ' disabled' : '') + '>Next &raquo;</button>';

    btnsEl.innerHTML = btnsHtml;
    paginationEl.style.display = 'flex';
  }

  function goStudentPage(page) {
    if (page < 1) return;
    studentPage = page;
    tabDataLoaded.students = false;
    loadStudents();
  }

  // ── INIT ──
  document.addEventListener('DOMContentLoaded', () => {
    // Set default date range to last 30 days
    const today = new Date();
    const thirtyAgo = new Date(today);
    thirtyAgo.setDate(thirtyAgo.getDate() - 30);
    document.getElementById('filter-to').value = today.toISOString().split('T')[0];
    document.getElementById('filter-from').value = thirtyAgo.toISOString().split('T')[0];

    loadOverview();
  });
</script>

</body>
